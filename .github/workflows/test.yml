name: Test Production

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6.4.0
        with:
          node-version: 24

      - name: Environment info
        run: |
          set -x
          uname -a
          bun --version
          node --version
          npm --version
          git --version
          which git node npm bun ollama docker gh || true

      - name: Install dependencies (Bun)
        run: |
          set -xeuo pipefail
          bun ci

      - name: Dependency audit
        run: |
          set -xeuo pipefail
          bun run dependencies:audit

      - name: Typecheck
        run: |
          set -xeuo pipefail
          bun run typecheck

      - name: Lint
        run: |
          set -xeuo pipefail
          bun run lint

      - name: Run tests (Bun)
        run: |
          set -xeuo pipefail
          bun test --timeout 120000 2>&1 | tee test-output.log

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-output-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test-output.log
            bun.lock
          retention-days: 7

      - name: Build bundle
        if: success()
        run: |
          set -xeuo pipefail
          bun run bundle

      - name: Smoke test
        if: success()
        run: |
          set -xeuo pipefail
          bun run smoke

      - name: Secret scan
        if: success()
        run: |
          set -xeuo pipefail
          bun run secrets:scan

      - name: Release check
        if: success()
        run: |
          set -xeuo pipefail
          bun run release:check

      - name: Package Check
        if: success()
        run: |
          set -xeuo pipefail
          bun run package:check

      - name: Test Global Install (NPM)
        if: success()
        run: |
          set -xeuo pipefail
          npm install -g .
          ur --version

  ide-extensions:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6.4.0
        with:
          node-version: 24

      - name: Verify VS Code extension
        working-directory: extensions/vscode-ur-inline-diffs
        run: |
          set -xeuo pipefail
          npm ci
          npm audit --audit-level=high
          npm run typecheck
          npm run build

      - name: Setup Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Kotlin 2.4.0 officially supports Gradle through 9.5.x.
          gradle-version: "9.5.0"

      - name: Build and validate JetBrains extension
        working-directory: extensions/jetbrains-ur
        run: |
          set -xeuo pipefail
          gradle --no-daemon buildPlugin verifyPluginConfiguration verifyPlugin
