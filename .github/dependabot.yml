version: 2

updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    open-pull-requests-limit: 10
    groups:
      compatible-dependency-updates:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /extensions/vscode-ur-inline-diffs
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    groups:
      vscode-compatible-dependency-updates:
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /extensions/jetbrains-ur
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    groups:
      jetbrains-compatible-dependency-updates:
        update-types:
          - minor
          - patch
